const ITEM_FULLTEXT = {
  "1":"Für den Betrieb ist eine Gefährdungsbeurteilung, in der alle auftretenden Gefährdungen ermittelt und entsprechende Maßnahmen zur Minimierung dieser festgelegt werden, durchzuführen. Das Ergebnis dieser Analyse ist zu dokumentieren. Im Rahmen unserer Betreuung erstellen wir diese Dokumentation gemeinsam mit Ihnen. \nBei Bedarf vereinbaren Sie bitte einen Termin mit uns.\n\nAnbei befindet sich ein Entwurf der Gefährdungsbeurteilung. Deshalb „Entwurf“ da die Erstellung einer Gefährdungsbeurteilung Ihre Aufgabe ist. Wir können dazu lediglich Zuarbeit leisten, wenn uns die Gefährdungen bekannt gemacht oder diese durch uns festgestellt worden. Wenn Sie mit dem Inhalt einverstanden sind, setzen Sie diese durch Ihre Unterschrift in Kraft. Anderenfalls korrigieren oder ergänzen Sie diese bitte. Eine Gefährdungsbeurteilung ist in regelmäßigen Abständen (in der Regel 1 Jahr) auf Aktualität zu überprüfen oder bei betrieblichen Veränderungen entsprechend anzupassen. Es sind Termine, Verantwortlichkeiten und die Erledigung entsprechend zu dokumentieren. Ebenfalls sind umgesetzte Maßnahmen regelmäßig auf Wirksamkeit zu überprüfen. Falls Sie dabei Unterstützung benötigen, setzen Sie sich bitte mit uns in Verbindung.",
  "2":"Für Betriebe ab 20 Vollzeitbeschäftigten fordert der Gesetzgeber im Arbeitsschutzgesetz die Gründung eines Arbeitsschutzausschusses. Der Arbeitsschutzausschuss besteht aus den folgenden Mitgliedern: Geschäftsleitung, Betriebsarzt, Sicherheitsfachkraft, Sicherheitsbeauftragter sowie der Betriebsrat. Der Ausschuss sollte vierteljährlich tagen, wünschenswert wäre mindestens 2-mal pro Jahr.",
  "3":"In Unternehmen mit regelmäßig mehr als 20 Beschäftigten hat der Unternehmer Sicherheitsbeauftragte zu bestellen. Sie unterstützen den Unternehmer bei der Durchführung festgelegter Maßnahmen. Die Anzahl der benötigten Sicherheitsbeauftragten richtet sich vor allem nach der Anzahl der Beschäftigten.",
  "4.1":"Mitarbeiterunterweisung\nZu den Gefahren bei der Tätigkeit sowie beim Umgang mit Arbeits- und Betriebsmitteln müssen die Mitarbeiter regelmäßig (vor Arbeitsaufnahme, jährlich wiederholend, Jugendliche halbjährlich!) unterwiesen werden.",
  "4.2":"Dokumentation der Unterweisung\nDiese Unterweisungen sind nicht zuletzt zu Ihrer juristischen Absicherung zu dokumentieren. Bitte benutzen Sie dafür beiliegende Unterweisungsnachweise!",
  "5":"Organisation von Erste Hilfe Maßnahmen, Verhalten bei Unfällen",
  "5.1/5.2":"Ersthelfer\nIn jedem Unternehmen müssen in Abhängigkeit von der Anzahl der anwesenden Beschäftigten ausgebildete Ersthelfer vorhanden sein. In Ihrem Fall fordert der Gesetzgeber mindestens 1 anwesenden Ersthelfer.\n\nWer führt diese Schulungen durch?\nErsthelferlehrgänge werden bei ermächtigten Stellen angeboten, wie z.B. Deutsches Rotes Kreuz, Malteser Hilfsdienst, Arbeiter Samariter Bund, DLRG oder auch Johanniter Unfallhilfe. Die anfallenden Lehrgangsgebühren werden unter Angabe der Betriebsnummer direkt mit der Berufsgenossenschaft abgerechnet. \n\nDas Anmeldeformular finden Sie unter: \nhttps://www.bgn.de/praevention-arbeitshilfen/praxishilfen-\nservice/ersthelferausbildung#c1756",
  "5.3":"Wiederholung von Ersthelferlehrgängen\nErsthelferlehrgänge müssen im Abstand von 2 Jahren wiederholt werden.",
  "5.4":"Verband-Material\nIn Ihrem Betrieb muss mindestens ein kleiner Verbandkasten nach DIN 13157 vorhanden sein.\n\nVollständigkeit Verbandkasten\nDer Inhalt von Verbandkästen ist in regelmäßigen Abständen auf Vollständigkeit und Aktualität zu prüfen. Verbrauchte Materialien sind umgehend aufzufüllen.",
  "5.5":"Kennzeichnung des Verbandkastens\nDer Verbandkasten muss durch ein weißes Kreuz auf quadratischem grünem Feld mit weißer Umrandung nach der Unfallverhütungsvorschrift \"Sicherheits- und Gesundheitsschutzkennzeichnung am Arbeitsplatz\" (DGUV Vorschrift 9) gekennzeichnet werden.",
  "5.6":"Aushänge\nAnleitungen zur Ersten-Hilfe müssen in jedem Unternehmen leicht erreichbar und augenfällig ausgehängt werden (siehe beiliegendes Plakat). Die entsprechenden Eintragungen sind zu ergänzen.",
  "5.7":"Unterweisungen zu Erste-Hilfe-Maßnahmen und zum Verhalten bei Unfällen \nDie Mitarbeiter sind mindestens jährlich zum Verhalten bei Unfällen zu unterweisen.",
  "5.8":"Aufzeichnungen von Erste-Hilfe-Leistungen\nErste-Hilfe-Leistungen, auch Bagatell-Unfälle, sind in einem Verbandbuch zu dokumentieren. Auch Unfälle mit scheinbar harmlosen Verletzungen sind einzutragen. Nicht selten entstehen aus solchen Unfällen Spätfolgen, die dann nicht mehr als Arbeitsunfall anerkannt werden können.",
  "6":"vorbeugender Brandschutz, Verhalten im Brandfall, Feuerlöscher",
  "6.1":"Geeignete Abfalleimer\nTabakreste dürfen nur in nichtbrennbare Abfalleimer mit dichtschließendem Deckel entsorgt werden. Papier ist getrennt zu entsorgen. \n\nBei der Auswahl von Dekoration ist darauf zu achten, dass nur gekennzeichnete („schwer entflammbar“) Dekoration verwendet wird.",
  "6.2":"Schulung der Mitarbeiter\nAlle Beschäftigte sind vor Arbeitsaufnahme und regelmäßig wiederholend über die Brandschutzbestimmungen, den Ablauf bei Brandalarm sowie die Evakuierung zu unterweisen.",
  "6.3":"Brandschutzhelfer\nZusätzlich hierzu/Es sind 10 Prozent der Beschäftigten speziell zum praktischen Umgang mit Löscheinrichtungen sowie zum Verhalten bei Feuer und Evakuierung zu schulen. Diese Schulung ist in Zeitabständen von 2 bis 3 Jahren zu wiederholen.",
  "6.4":"Notfallplan\nZur schnellen und organisierten Alarmierung ist ein Brand-Alarmplan zu erstellen und auszuhängen. Ein Brandnotfallplan enthält die wesentlichen Aufgaben und Verantwortlichkeiten zum Verhalten bei Bränden sowie die entsprechenden Kontakte.",
  "6.5":"Kennzeichnung von Flucht- und Rettungswegen und Notausgängen\nFluchtwege und Notausgänge müssen durch nachleuchtende Schilder gekennzeichnet sein. In Ihrem Fall ist es ausreichend, wenn die Ausgangstüren wie folgt gekennzeichnet werden:",
  "6.6":"Evakuierungsübungen\nAuf Grundlage der Flucht- und Rettungspläne sind jährliche Räumungsübungen durchzuführen. Anhand der Übungen soll überprüft werden, ob:\ndie Alarmierung zu jeder Zeit unverzüglich ausgelöst werden kann,\ndie Alarmierung alle Personen erreicht, die sich im Gebäude aufhalten,\nsich alle Personen, die sich im Gebäude aufhalten, über die Bedeutung der jeweiligen Alarmierung im Klaren sind,\ndie Fluchtwege schnell und sicher benutzt werden können.",
  "6.7":"Feuerlöscher\nFür die Brandbekämpfung ist mindestens ein 6 kg ABC-Pulverlöscher oder 6 Liter Schaumlöscher bereitzustellen.",
  "6.8":"Fettbrandfeuerlöscher\nZur Bekämpfung von Fettbränden ist zusätzlich ein geeigneter Löscher (3 Liter oder 6 Liter Fettbrandlöscher) zu installieren. Fettbrandfeuerlöscher sind mit der Brandklasse „F“ gekennzeichnet.",
  "6.9":"Prüfung von Feuerlöschern\nFeuerlöscher müssen mindestens alle 2 Jahre durch einen Sachkundigen geprüft werden. Die Prüfung des ___ ist überfällig und zeitnah nachzuholen.",
  "6.10":"Standort und Kennzeichnung von Feuerlöschern\nFeuerlöscher müssen an gut sichtbaren und im Brandfall leicht zugänglichen Stellen angebracht sein, an denen sie vor Beschädigungen und Witterungseinflüssen geschützt sind. Die Stellen, an denen sich Feuerlöscher befinden, müssen durch das Brandschutzzeichen F04 \"Feuerlöschgeräte\" gekennzeichnet sein.\n\nAnmerkung:\nFeuerlöscher sollten nur so hoch über dem Fußboden angeordnet sein, dass auch kleinere Personen diese ohne Schwierigkeiten aus der Halterung entnehmen können. Als zweckmäßig hat sich eine Griffhöhe von 80 bis 120 cm erwiesen.",
  "6.11":"Freie Flucht- und Rettungswege und Notausgänge\nFluchtwege, Treppen und Verkehrswege in Gebäuden und im Freien müssen ständig in voller Breite freigehalten werden.",
  "6.12":"Offene Fluchtwegstüren\nVerschließbare Türen und Tore im Verlauf von Fluchtwegen müssen jederzeit von innen ohne besondere Hilfsmittel leicht zu öffnen sein. Dies ist gewährleistet, wenn sie mit besonderen mechanischen Entriegelungseinrichtungen, die mittels Betätigungselementen, wie z. B. Türdrücker, Panikstange, Paniktreibriegel oder Stoßplatte, ein leichtes Öffnen in Fluchtrichtung jederzeit ermöglichen, oder mit bauordnungsrechtlich zugelassenen elektrischen Verriegelungssystemen ausgestattet sind.",
  "6.13":"Mindestbreite von Fluchtwegen\nDie Mindestbreite der Fluchtwege bemisst sich nach der höchstmöglichen Anzahl der Personen, die im Bedarfsfall den Fluchtweg benutzen müssen und ergibt sich aus der folgenden Tabelle:",
  "6.14":"Sicherheitsbeleuchtung Fluchtwege\nWeiterhin sind Fluchtwege mit einer Sicherheitsbeleuchtung auszurüsten, wenn bei Ausfall der allgemeinen Beleuchtung das gefahrlose Verlassen der Arbeitsstätte nicht gewährleistet ist.",
  "6.15":"Feuer- und Rauchschutztüren\nFeuerschutz- und Rauchschutztüren sind dazu bestimmt, im Brandfall den Durchtritt von Feuer bzw. Rauch in andere Brandabschnitte zu verhindern. Daher müssen sie bei Ausbruch eines Feuers geschlossen sein.\n\nDie Feuerschutz- und Rauchschutztüren müssen selbsttätig schließen. Auf keinen Fall dürfen diese Türen verkeilt oder festgebunden werden! \nIhre Funktionsfähigkeit muss regelmäßig kontrolliert werden. \n\nIm Brandfall könnten auch versicherungsrechtliche Konsequenzen entstehen, da eine blockierte Brandschutztür ein grob fahrlässiger Mangel ist.",
  "6.16":"Flucht- und Rettungswegpläne\nFlucht- und Rettungswegpläne, müssen in den Zimmern und/oder Fluren ausgehängt werden. Flucht- und Rettungswegpläne sollten der folgenden Form entsprechen:\n\nWenn gewünscht, kann ich diese für das gesamte Haus erstellen. Dazu bräuchte ich die Grundrisspläne für die verschiedenen Etagen. Kosten entstehen dafür nicht.",
  "6.17":"Brandschutzordnung\nZur innerbetrieblichen Brandverhütung sowie zum Verhalten bei Bränden muss eine Brandschutzordnung erstellt und den Mitarbeitern kommuniziert werden. Diese besteht gemäß der DIN14096 aus folgenden 3 Teilen: \n\nBrandschutzordnung Teil A\nIn diesem Teil der Brandschutzordnung liegt der Fokus auf dem Verhalten im Falle eines Brandes. Das wird im Rahmen einiger Handlungsanweisungen veranschaulicht. Diese sollte an allen zentralen Orten des Gebäudes aufgehängt werden. Somit ist das eine Ergänzung zu den Aushängen der Flucht- und Rettungswege. Genau gesagt, werden hier zunächst Hinweise zur Prävention eines Brandes aufgeführt. Das Bedeutet, dass im Gebäude ein klares Rauchverbot und das Verbot von offenem Feuer gelten.\n\nBei den Verhaltensregeln ist ein klarer Verlauf aufgeführt. Demnach soll im Brandfall zuerst der Brand gemeldet werden. Dazu gehört sowohl das Auslösen der Rauchmelder als auch das Alarmieren der Feuerwehr. Außerdem gibt die Brandschutzordnung die Anweisung, die ausgeschilderten Fluchtwege zu nutzen und alle Türen zu schließen. Darüber hinaus müssen unbedingt alle Anwesenden aufmerksam gemacht werden und ggf. Hilfestellung geleistet werden. Erst dann sollte man einen Löschversuch starten. Das kann im Sinne des Einsatzes von Feuerlöschern oder Löschdecken geschehen, oder auch durch das Auslösen der Wandhydranten.\n\nBrandschutzordnung Teil B\nZusätzlich zu den Aushängen im Gebäude sind Arbeitgeber*innen dazu verpflichtet, allen Beschäftigten den Teil B der Brandschutzordnung auszuhändigen. Darin sind nochmal genauere Anweisungen zur Eindämmung von Bränden aufgelistet. Ebenso wird die Reduzierung der Rauchausbreitung erklärt. Diese Erläuterungen helfen den Beschäftigten, auch im Ernstfall einen möglichst ruhigen Kopf zu bewahren.\n\nBrandschutzordnung Teil C\nDer letzte Teil dieser Verordnung wendet sich an die Beschäftigten, die zusätzliche Verantwortung beispielsweise als Brandschutzhelfer oder -beauftragte haben. Dies ist allerdings auch „nur“ eine schriftliche Zusammenfassung aller nötigen Schritte. Eine Ausbildung zum Brandschutzhelfer ersetzt das also natürlich nicht!",
  "7":"Verwendung von Flüssiggas und Erdgas",
  "7.1":"Prüfung ortsfester Verbrauchseinrichtungen\nNach § 33 der Unfallverhütungsvorschrift \"Verwendung von Flüssiggas\" (DGUV Vorschrift 79) müssen:\n\nFlüssiggasanlagen (Versorgungs- und Verbrauchsanlage) für Brennzwecke mit ortsfesten Verbrauchseinrichtungen, soweit sie aus Druckgasbehältern (z. B. Gasflaschen) versorgt werden und Flüssiggasverbrauchsanlagen (Herd etc.) für Brennzwecke mit ortsfesten Verbrauchseinrichtungen, soweit sie aus Druckbehältern (z. B. Gastank) versorgt werden, durch Sachkundige mindestens alle 4 Jahre wiederkehrend geprüft werden.",
  "7.2":"Prüfung ortsveränderlicher Verbrauchseinrichtungen\nOrtsveränderliche Verbrauchseinrichtungen müssen mind. alle 2 Jahre geprüft werden.",
  "7.3":"Geeignete Druckregler und andere Sicherheitseinrichtungen\nDer verwendete Druckregler an der Flüssiggasanlage ist für den gewerblichen Bereich unzulässig und muss ausgetauscht werden. Zusätzlich ist eine Schlauchbruchsicherung erforderlich .",
  "7.4":"Schutzabstände bei Terrassenheizstrahlern\nZusätzlich müssen die vom Hersteller vorgeschriebenen Schutzabstände zwischen Schirm und Zelten o.ä. beachtet werden. Ein Abstand von 1,0m ist unbedingt erforderlich.",
  "7.5":"Dichtigkeitsprüfung, Betriebsanweisung und Unterweisung\nEs ist unbedingt sicherzustellen, dass bei jedem Flaschenwechsel eine Dichtigkeitsprüfung mit einem Lecksuchspray durchzuführen ist. Ein geeignetes Lecksuchspray ist bereitzustellen. Zum Umgang mit der Flüssiggasanlage ist eine Betriebsanweisung auszuhängen und das Personal dazu nochmals gesondert einzuweisen.",
  "7.6":"Flüssiggasflaschen in Arbeitsbereichen\nIn Räumen bis 500 m3 dürfen sich max. 2 Flüssiggasflaschen mit einem Füllgewicht bis 11 kg befinden.",
  "7.7":"Schutz vor Erwärmung von Flüssiggasflaschen\nDie Flüssiggasflaschen sind so aufzustellen, dass sie gegen unzulässige Erwärmung geschützt sind. Eine unzulässige Erwärmung des Flüssiggases in der Flasche ist bei mehr als 40 °C anzunehmen. Mindestabstände für Flüssiggasflaschen von 0,7 m zu Heizgeräten können ausreichend sein.",
  "7.8":"Schutzbereiche bei angeschlossenen Flüssiggasflaschen\nZum Entleeren angeschlossener Flüssiggasflaschen ist ein ausreichender Schutzbereich einzuhalten, in dem sich z.B. keine\nKelleröffnungen und -zugänge,\nKanaleinläufe ohne Flüssigkeitsverschluss,\nZündquellen, offene Flammen sowie\nbrennbaren Stoffe (z.B. Fette, Öle, brennbare Flüssigkeiten, Verpackungsmaterial)\n\nbefinden dürfen .",
  "7.9":"Lagerung von Flüssiggasflaschen\nGrundsätzlich sind Flüssiggasflaschen im Freien oder in einem besonderen Aufstellungsraum aufzustellen und zu lagern, z.B. in einem Raum mit ausreichendem Luftwechsel. Sie sollten in abschließbaren Gitterboxen im Freien aufbewahrt werden.",
  "7.10":"Lagerung von Flüssiggasflaschen in Kellerräumen\nFlüssiggasflaschen dürfen nicht in Kellerräumen gelagert werden. Sie sollten in abschließbaren Gitterboxen im Freien aufbewahrt werden.",
  "7.11":"Lagerung im Freien\nWerden Flüssiggasflaschen im Freien gelagert, dürfen sich innerhalb der Schutzbereiche z.B. keine Zündquellen, keine tiefer gelegenen Bereiche und keine brennbaren Stoffe befinden. Die Abmessungen der Schutzbereiche sind nachfolgender Abb. zu entnehmen. \n\nDer Schutzbereich darf sich nicht auf Nachbargrundstücke oder öffentliche Verkehrsflächen erstrecken. \n\nDer Schutzbereich darf an höchstens 2 Seiten durch mindestens 2 m hohe öffnungslose Schutzwände aus nichtbrennbaren Baustoffen eingeengt sein. \n\nAußerdem müssen die Flaschen \nunter Verschluss,\ngegen Umfallen gesichert,\ngegen zu hohe Erwärmung gesichert\ngelagert werden.\n\nDer Bereich ist wie folgt zu kennzeichnen:",
  "7.12":"Lagerung in Räumen\nBei der Lagerung in Räumen sind zusätzlich folgende Anforderungen zu beachten, u.a.:\nKeine tiefer gelegenen Räume, Bereiche wie Kanäle ohne Flüssigkeitsverschluss, Kelleröffnungen im Lager vorhanden,\nausreichende Be- und Entlüftung gewährleistet, z.B.\ntechnische Lüftung mit zweifachem Luftwechsel/Stunde\noder\nnatürliche Lüftung mit direkt ins Freie führende Lüftungsöffnungen von insgesamt 1/100 der Bodenfläche (→ in der Regel Querlüftung),\nkeine Brandlasten wie Papier, Fette, Öle vorhanden\nFußboden grundsätzlich aus nichtbrennbaren Materialien und\nTrennung der Lagerräume von angrenzenden Räumen durch mindestens \n      feuerhemmende Bauteile (F 30).",
  "7.13":"Erdgasanlagen\nErdgasversorgungseinrichtungen und Verbrauchsanlagen sind prüfpflichtig. Zu den Anforderungen erhalten Sie beiliegende Informationen.",
  "8":"Gefahren durch elektrischen Strom, Prüfungen elektrischer Anlagen und Geräte",
  "8.1":"Prüfung ortfester elektrischer Anlagen\nOrtsfeste elektrische Anlagen und Betriebsmittel (Geräte, die in der Regel nicht bewegt werden können) müssen alle 4 Jahre durch eine befähigte Person (Elektrofachkraft mit spezifischen Kenntnissen) geprüft werden, wenn nicht andere Vorschriften oder Institutionen (z.B. Sachversicherer, Vermieter) kürzere Prüfintervalle fordern. \n\nDie Forderungen sind für ortsfeste elektrische Anlagen und Betriebsmittel auch erfüllt, wenn diese von einer Elektrofachkraft ständig überwacht und durch messtechnische Maßnahmen im Rahmen des Betreibens (z.B. Überwachen des Isolationswiderstandes) geprüft werden.\n\nTabelle: Prüffristen für ortsfeste Anlagen und Betriebsmittel",
  "8.2":"Prüfung ortsbeweglicher elektrischer Geräte und Anlagen\nOrtsveränderliche elektrische Geräte und Betriebsmittel (Handgeräte, bewegliche Maschinen, Verlängerungen, Geräte, die unter Spannung bewegt werden können, etc.) unterliegen besonderen Gefahren in Abhängigkeit von der jeweiligen Beanspruchung (Beweglichkeit, Feuchtigkeit, andere Umgebungsbedingungen wie Reinigungsmittel etc.). \n\nDeshalb hat der Unternehmer vor Inbetriebnahme, nach Änderung oder Instandsetzung und regelmäßig wiederkehrend Prüfungen zu veranlassen. Die Prüfung vor Inbetriebnahme kann entfallen, wenn der Hersteller oder Lieferer bei verwendungsfertigen Geräten eine Konformitätserklärung mit Hinweis auf die entsprechenden elektrotechnischen Regelungen abgibt. \n\nDie Festlegung der Art des Betriebsmittels (ortsfest, ortsbeweglich) sowie der exakten Prüffristen obliegt dem Unternehmer.\n\nDie Vorschrift DGUV Vorschrift 3 nennt folgende Richtwerte zu den Prüffristen:\n \nEs wird empfohlen, für den Betrieb ein entsprechendes Kataster zu erstellen, welches die Geräte mit den entsprechenden Prüffristen und eine Risikoeinschätzung beinhaltet. Es wird empfohlen, die Prüfungen durch ein ortsansässiges Elektro-Unternehmen mit den entsprechenden Kenntnissen durchführen zu lassen.",
  "8.3":"Feuchtraumgeeignete Elektroinstallation\nKüchen sind als feuchte bzw. nasse Räume als „Feuchträume“ gemäß den elektrischen Regeln DIN VDE 0110 anzusehen. Demnach muss die elektrische Installation diesen Regelungen entsprechen. Insbesondere sind in Feuchträumen FI- oder RCD-Schutzschalter zwingend vorgeschrieben.",
  "8.4":"Defekte elektrische Anlagen und Geräte\nDefekte bzw. entfernte Feuchtraumabdeckungen an Leuchten und Steckdosen sind instand zu setzen.",
  "8.5":"Geeignete Elektroinstallationen\nEs sind ausschließlich geeignete Elektroinstallationen vorzunehmen. Es dürfen keine Mehrfachsteckdosen gekoppelt werden.",
  "9":"Prüf- und Wartungsplan, befähigte Person\n\nUnabhängig von der elektrischen Prüfung muss der Arbeitgeber Arbeitsmittel, die Schäden verursachenden Einflüssen ausgesetzt sind, die zu Gefährdungen der Beschäftigten führen können, wiederkehrend von einer zur Prüfung befähigten Person prüfen zu lassen. Die Fristen hat der Arbeitgeber festzulegen, in der Regel jährlich. Ergibt die Prüfung, dass ein Arbeitsmittel nicht bis zu der nächsten wiederkehrenden Prüfung sicher betrieben werden kann, ist die Prüffrist neu festzulegen. Eine zur Prüfung befähigte Person ist eine Person, die durch ihre Berufsausbildung, ihre Berufserfahrung und ihre zeitnahe berufliche Tätigkeit über die erforderlichen Kenntnisse zur Prüfung des Arbeitsmittels verfügt.\n\nFalls es Wartungsverträge gibt, kann das als Prüfnachweis verwendet werden. Anderenfalls sollte der vorhandene Prüf- und Wartungsplan um Sicherheitsthemen ergänzt bzw. eine separate Prüfliste geführt werden.",
  "10":"Alleinarbeit liegt vor, wenn eine Person allein, außerhalb von Ruf- und Sichtweite zu anderen Personen, Arbeiten ausführt. Dabei gibt es keine zeitliche Komponente. Das ist grundsätzlich zulässig. Der Unternehmer muss aber in jedem Falle sicherstellen, dass unverzüglich Erste Hilfe geleistet werden kann. Um im Notfall einen Notruf absetzen zu können, sind am Ort der Alleinarbeit Notrufmöglichkeiten vorzusehen. Diese richten sich nach der Gefährlichkeit der durchgeführten Arbeiten und werden nach BGR 139 in folgende 3 Gefährdungsstufen nach der Schwere eingeteilt.\n\nAus der Zuordnung in die Gefährdungsstufen sind bereits folgende Konsequenzen abzuleiten:\nGefährdungsstufe gering:\nBei einer geringen Gefährdung ist eine Überwachung von Einzelarbeitsplätzen\ngrundsätzlich nicht erforderlich.\n\nGefährdungsstufe erhöht:\nBei einer erhöhten Gefährdung ist eine Überwachung des Einzelarbeitsplatzes, z.B.\ndurch Kontrollgänge oder Kontrollanrufe, erforderlich, wenn die Notfallwahrscheinlichkeit (nach Tabelle 3) nicht höher als mäßig einzustufen ist.\nIst die Wahrscheinlichkeit eines Notfalls als hoch einzustufen, wird eine ständige\nÜberwachung erforderlich, wie sie bei kritischen Gefährdungen vorgeschrieben ist.\n\nGefährdungsstufe kritisch:\nBei einer kritischen Gefährdung ist eine ständige Überwachung erforderlich z.B.\ndurch:\n• Eine zweite Person,\n• Personen-Notsignal-Anlage,\n• Video-Einrichtung im Dauerbetrieb.\n\nAlleinarbeit ist nicht zulässig, wenn beim Vorliegen einer kritischen Gefährdung die\nWahrscheinlichkeit eines Notfalls (nach Tabelle 3) als hoch eingestuft werden muss.\nWeiterhin wird die Wahrscheinlichkeit eines Notfalls wie folgt eingeteilt:\n\nAußerdem ist die Zeit für Hilfsmaßnahmen entsprechend zu berücksichtigen:\n\nAus diesen Komponenten ist eine Risikobeurteilung mit folgender Bedingung abzuleiten:\nR=(GZ+EV) x NW < 30",
  "11":"Umgang mit Reinigungsmitteln und anderen Gefahrstoffen",
  "11.1":"Betriebsanweisungen und Sicherheitsdatenblätter\nFür die verwendeten Reinigungsmittel, die Gefahrstoffe enthalten, sind die Sicherheitsdatenblätter zu beschaffen sowie die Betriebsanweisungen zu erstellen und auszuhängen.\n\nBetriebsanweisungen sind rechtsverbindliche Anweisungen vom Unternehmer an das Personal.  Bitte kontrollieren Sie die Inhalte und machen Sie diese den Mitarbeitern bekannt (aushängen). Bitte informieren Sie uns auch, falls noch Betriebsanweisungen fehlen.",
  "11.2":"Schutzausrüstung und deren Verwendung\nSchutzausrüstung (Brille und Handschuhe) ist bereitzustellen und zu verwenden. Das Personal ist dazu zu unterweisen. Der Unternehmer hat die Pflicht, die sachgemäße Verwendung von Schutzausrüstung durchzusetzen.",
  "11.3":"Grill- und Konvektomatenreiniger, Bratkrustenentferner\nBei Verwendung von Grillreiniger sind Schutzbrille und Schutzhandschuhe zu tragen.",
  "11.4":"Kennzeichnung von Reinigungsmittelbehälter\nSprühflaschen und andere Behälter, in denen sich gefährliche Reinigungsmittel befinden, sind mit den entsprechenden Gefahrstoffsymbolen zu kennzeichnen.",
  "11.5":"Sicherer Umgang mit Brezellauge\nZum sicheren Umgang mit der Brezellauge muss eine Betriebsanweisung erstellt und ausgehangen werden (beiliegend). Beim Dosieren der Lauge muss entsprechende Schutzausrüstung (Schutzbrille, Chemikalienschutzhandschuhe) getragen werden. Diese und geeignete Dosierhilfen sind bereit zu stellen. Die Anwendung durch die Mitarbeiter ist durchzusetzen.",
  "11.6":"Geeignete Dosiereinrichtungen\nZum sicheren Dosieren der Reinigungsmittel aus dem Kanister sind geeignete Umfülleinrichtungen bereitzustellen.",
  "12.1":"Geeignete Fettfilter\nDie vorhandenen Fettfilter in der Dunstabzugshaube verhindern einen Flammendurchschlag in nachgeschaltete Lüftungsrohre bei Bränden im Herdbereich nicht.  Gestrickfilter sind aus brandschutztechnischen Gründen, wegen des veränderlichen Widerstandes und des hohen Reinigungsaufwandes nicht zulässig. Deshalb sollten flammensichere Luftwirbelfilter installiert werden .",
  "12.2":"Prüfung von Dunstabzugshauben\nDunstabzugshauben, Lüftungskanäle und Ventilatoren müssen halbjährlich hinsichtlich etwaiger Ablagerungen durch eine befähigte Person geprüft werden.",
  "12.3":"Standort Fritteuse\nDie Fritteuse muss zwingend unter der Dunstabzugshaube platziert werden.",
  "12.4":"Bei gasbetriebenen Herden muss die Dunstabzugshaube mit dem Herd gekoppelt sein.",
  "12.5":"Lückenhafte Fettfilter\nDie Dunstabzugshaube muss mit Fettfiltern komplett geschlossen sein, um eine Brandausbreitung zu verhindern. Die Lücke ist zu schließen.",
  "13":"Prävention von Hauterkrankungen, die durch Feuchtarbeit verursacht werden",
  "13.1":"Hautschutzcremes und Hautschutzplan\nZur Vermeidung von Hautkrankheiten müssen den Mitarbeitern Hautschutz- und Hautpflegecremes zur Verfügung gestellt werden. Dabei sollte darauf geachtet werden, dass nur unparfümierte Schutzcremes verwendet werden, da diese vor der Arbeit und nach Pausen aufgetragen werden. Hautschutzmaßnahmen sind in einem entsprechenden Hautschutzplan festzulegen, welcher an geeigneter Stelle auszuhängen ist (siehe beiliegender Hautschutzplan).",
  "13.2":"Hautschutz beim Spülen und bei Reinigungsarbeiten\nBei andauerndem Wasserkontakt (Spülen) oder Kontakt mit Reinigungsmitteln sollten Einweg oder Mehrweghandschuhe (optimal mit Baumwollunterziehhandschuh) getragen werden.",
  "13.3":"Keine gepuderten Latexhandschuhe!\nGepuderte Latex-Handschuhe dürfen im gewerblichen Bereich nicht verwendet werden, da Puder Allergien verursachen kann.",
  "13.4":"Verzicht auf Latex-Handschuhe\nGrundsätzlich sollte auf die Verwendung von Latex-Handschuhen verzichtet werden. Zum einen besteht auch bei ungepuderten Handschuhen die Gefahr einer allergischen Reaktion bei den Mitarbeitern, zum anderem sind Latexhandschuhe nicht öl- bzw. fettbeständig. Die Verwendung von Nitrilhandschuhen wird empfohlen.",
  "13.5":"Tragen von schwarzen Einweghandschuhen\nBeim Tragen von schwarzen Einweghandschuhen können Mitarbeiter auf den Farbstoff allergisch reagieren. Deshalb sollte generell auf das Tragen von schwarzen Handschuhen verzichtet werden.",
  "13.6":"Arbeitsmedizinische Vorsorgeuntersuchungen zur Vorbeugung von Hauterkrankungen\nNach Gefahrstoffrecht und der Verordnung zur arbeitsmedizinischen Vorsorge (ArbmedVV) sind bei Feuchtarbeit über 4 Stunden/Tag arbeitsmedizinische Pflichtuntersuchungen (G24) durchzuführen, bei 2 bis 4 Stunden Feuchtarbeit/Tag sind diese den Mitarbeitern anzubieten. Es wird eingeschätzt, dass die Mitarbeiter in Küche und Housekeeping Feuchtarbeit von mehr als 4 Stunden pro Tag leisten, die Service-Mitarbeiter lediglich 2-4 Stunden. Sowohl die Durchführung als auch das Angebot sind zu dokumentieren. Hierzu ist ein Untersuchungskataster zu führen.\n\nAus Gründen der Effektivität und Effizienz empfehlen wir, die Untersuchungen im Rahmen eines Workshops durchzuführen, der noch im laufenden Jahr stattfinden sollte.",
  "13.7":"Geeignete Händereinigungs- und desinfektionsmittel\nAls Händedesinfektions- und –reinigungsmittel wird eine Händedesinfektionsseife verwendet. Diese Kombipräparate sind sehr hautschädigend, preisintensiv und eine desinfizierende Wirkung findet oft nicht statt, da sich in der betrieblichen Praxis selten ein Mitarbeiter 30 Sek. die Hände wäscht. Wir empfehlen die Verwendung von getrennten Produkten.",
  "14.1":"Geeignete Arbeitsschuhe\nDie Mitarbeiter müssen geeignete Arbeitsschuhe tragen. Folgende Anforderungen müssen eingehalten werden:\nrutschhemmende Sohlen,\nvorn geschlossen, hinten mindestens einen Fersenriemen,\nwiderstandsfähig gegen Flüssigkeiten, Öle und Fette, Gefahrstoffe (Reinigungsmittel).",
  "14.2":"Arbeitsschutzschuhe in Bäckereien\nBeim Umgang mit fahrbaren Teigkesseln, Gär- und Stikkenwagen sind Arbeitsschutzschuhe S 2 zu tragen. Diese hat der Arbeitgeber bereitzustellen.",
  "14.3":"Arbeitsschutzschuhe im Haustechnikbereich\nBei Arbeiten mit Verletzungsgefahr im Fußbereich, wie z.B. Rasenmähen, Veranstaltungsbereich, sonstige Handwerkerarbeiten, sind Arbeitsschutzschuhe S 2 zu tragen.",
  "15":"Gefahren durch Absturz von Leitern und Treppen",
  "15.1":"Prüfung von Leitern\nLeitern sind mindestens jährlich auf ihren einwandfreien Zustand hin zu prüfen. Die Prüfung ist zu dokumentieren.",
  "15.2":"Sichere Benutzung von Leitern\nDie Mitarbeiter sind hinsichtlich ordnungsgemäßer Benutzung (Standfestigkeit, seitliches Hinauslehnen, Aufstiegshöhe) regelmäßig zu unterweisen. Eine Betriebsanweisung ist auszuhängen.",
  "15.3":"Defekte Leitern\nDie vorhandene Leiter ist mangelhaft und ist nicht mehr zu benutzen und zu ersetzen. Es fehlen die Kunststofffüße, die ein Wegrutschen der Leiter verhindern sollen.",
  "15.4":"Treppen\nAn Treppen ab 4 Stufen muss ein Handlauf vorhanden sein. An der Treppe___ ist ein geeigneter Handlauf zu installieren.",
  "16":"Gefahren an kraftbetätigten Türen",
  "16.1":"Prüfung von kraftbetätigten Türen\nKraftbetätigte Türen müssen durch eine befähigte Person (Fachfirma) regelmäßig geprüft werden. Dabei sollte ein Prüfintervall von einem Jahr nicht überschritten werden.",
  "17":"Gefahren durch Aufschnittmaschinen",
  "17.1":"Fehlende Schlittenrückwand\nAufschnittmaschinen müssen Einrichtungen am Schlitten besitzen, die verhindern, dass während des Schneidens die Hand oder Finger ins Messer gelangen. Die fehlende Schlittenrückwand (mind. 150mm breit) ist instand zu setzen.",
  "17.2":"Nicht überlappende Anschlagplatte\nIn Nullstellung muss die Anschlagplatte zum Messer mindestens einen Überstand von 1mm haben, um beim Putzen nicht in das Messer zu gelangen. Da der Sicherheitsmangel technisch nicht behoben werden kann, muss die Maschine ersetzt werden.",
  "17.3":"Schnittfeste Handschuhe beim Messerwechsel\nBei der Reinigung ist darauf zu achten, dass das Rundmesser nur mit Hilfsmitteln zu reinigen ist. Beim Ausbau des Messers sind schnittfeste Handschuhe zu tragen.",
  "17.4":"Sicherer Umgang mit der Aufschnittschneidemaschine\nZum Umgang mit der Aufschnittmaschine sind die Mitarbeiter zu unterweisen und dies zu dokumentieren. Eine Betriebsanweisung ist auszuhängen.",
  "17.5":"Zwangsführung des Restehalters\nDer Restehalter darf in einem Bereich von 60 mm vor dem Messer nicht hochgeklappt werden können. Der Resthalter ist entsprechend instand zu setzen.",
  "18.1":"Aufbewahrung von Messern\nSchnittverletzungen durch Messer entstehen oft durch falsche Lagerung (z.B. viele Messer in einer Schublade). So verletzen sich viele Köche beim Herausnehmen der Messer. Deshalb sollten Messer an Magnetleisten oder in Messerblöcken aufbewahrt werden.",
  "18.2":"Schutzausrüstung bei Ausbeinarbeiten\nBei Ausbeinarbeiten sind Stechschutzschürze und Kettenhandschuhe zu tragen.",
  "18.3":"Sicherer Umgang mit Messern\nDas Personal ist zum sicheren Umgang mit Messer zu unterweisen.",
  "19.1":"Einschubhöhen an Konvektomaten\nBeim Öffnen der Tür des Konvektomaten kommt es sehr oft zu Verbrühungen und Verbrennungen im Kopfbereich ebenso wie beim Herausziehen von Einschüben mit flüssigen Speisen.\n\nDas Personal ist zum sicheren Umgang zu unterweisen.\n\nFlüssige Speisen dürfen über 1,60m Höhe nicht eingeschoben werden. Die Höhe ist zu kennzeichnen.",
  "19.2":"Fettspritzer an Fritteusen\nAn Fritteusen kommt es häufig zu Verbrennungen durch Fettspritzer von Gegenständen, die in die Fritteuse gelangen. So sind z.B. Kellen u.a., die direkt über der Fritteuse in der Dunstabzugshaube hängen und sich durch Fehlgriffe lösen, eine häufige Unfallursache.\n\nDie Arbeitsmittel, die direkt über der Fritteuse hängen, sind zu entfernen.",
  "19.3":"Sicherer Umgang mit Fritteusen\nDas Personal ist zum sicheren Umgang mit heißem Fett zu unterweisen, hinsichtlich \nEingabe des Fettes (Brandgefahr bei festem Fett)\nAblassen und Transport des Fettes (Schutzhandschuhe, geschlossene Behälter)\nUmgang beim Frittieren (vorsichtiges Einsetzen des Korbes, kein nasses Frittiergut etc.)\nBrandgefahr\n\nEine Betriebsanweisung (beiliegend) ist auszuhängen.",
  "19.4":"Verbrühungen an Mikrowellen\nBeim Herausnehmen von heißen, flüssigen Speisen aus sehr hoch aufgestellten Mikrowellen kommt es sehr oft zu Verbrennungen. Die Mikrowelle sollte nicht höher als 1,60 aufgestellt sein.",
  "19.5":"Vermeidung von Wasserspritzern in Fritteusen\nWerden Fettbackgeräte oder Fritteusen zusammen mit anderen Geräten in einer \"Linie\" aufgestellt, ist darauf zu achten, dass dadurch keine zusätzlichen Gefahren für das Bedienungspersonal entstehen. So kann es z.B. durch Wassereintrag oder Wasserspritzer zum Herausschleudern von heißem Fett/Öl kommen. \n\nFür einen sicheren Betrieb ist zwischen den Frittiereinrichtungen und Geräten, die Wasser beinhalten (Fritteusen und Bainmarie oder Kochkessel etc.) ein Abstand von mindestens 900 mm einzuhalten oder eine Spritzschutzeinrichtung (z.B. Abweisblech) mit einer Mindesthöhe von 350 mm zu installieren.",
  "20":"Gefahren beim Umgang mit der Getränkeschankanlage",
  "20.1–20.3":"Beurteilung der Gefährdungen\nAufstellräume für Schankgasbehälter (Druckgasbehälter mit CO2 oder Mischgas) sowie alle Räume, durch die Schankgasleitungen führen, müssen hinsichtlich der Wahrscheinlichkeit des Auftretens von gefährlichen Schankgaskonzentrationen in der Raumluft beurteilt und ggf. Maßnahmen festgelegt werden.\n\nZusätzliche Sicherheitsmaßnahmen\nUnter Berücksichtigung der Raumgröße (Kühlraum und Aufstellraum der Druckgasflasche) ist eine gefährliche Konzentration von CO2 durch Leitungsdefekte oder Undichtigkeiten möglich.\nDa Kohlendioxid oder Stickstoff nicht durch Geruch oder Farbe wahrgenommen werden können, fordert der Gesetzgeber eine der drei folgenden technischen Maßnahmen:\nKohlendioxidwarnanlage installieren oder\nbodenseitige zwangsgesteuerte Entlüftungsanlage installieren oder\nfür ausreichende natürliche Lüftung sorgen (Fenster ständig geöffnet halten).\n\nIm konkreten Fall muss eine Kohlendioxidwarnanlage mit Sensoren im Kühlraum und Aufstellraum der Druckgasflaschen installiert werden, da die beiden anderen Alternativen wegen der Kühlung ausscheiden.\n\nAußerdem ist:\neine 2-jährliche Sachkundigen-Prüfung der Anlage durchzuführen,\ndas Personal zum sicheren Umgang mit der Getränkeschankanlage auch hinsichtlich der Gefahren durch mögliches Bersten der Flasche (z.B. bei Umfallen der Flasche) und des Fasses (z.B. bei defekten Druckminderer), Gefahren durch unkontrolliert ausströmendes Gas sowie später zur Funktionsweise der Gaswarnanlage zu unterweisen. Diese Unterweisungen sind zu dokumentieren.",
  "20.4":"Prüfung von Getränkeschankanlagen\nGetränkeschankanlagen sind mindestens alle 2 Jahre durch einen Sachkundigen sicherheitstechnisch zu prüfen. Die Prüfung ist zu dokumentieren.",
  "20.5":"Sicherung von Druckgasflaschen\nDie Schankgasflaschen sind durch Anketten gegen Umfallen zu sichern.\n\nAnschluss der Druckgasflaschen\nVon Druckgasflaschen geht generell eine Gefahr aus. Deshalb dürfen an der Schankanlage je Anschluss lediglich eine angeschlossene Flasche sowie ein Reserveflasche vorgehalten werden, das heißt bei zwei Anschlüssen maximal vier Druckgasflaschen.",
  "21":"Hygiene und Infektionsschutz (informativ)",
  "21.1":"Vor Arbeitsaufnahme (Einstellung) muss geprüft werden, ob die Beschäftigten in Service und Küche einen Erstbelehrungsnachweis nach Infektionsschutzgesetz vom Gesundheitsamt oder eine Gesundheitsausweis nach Bundesseuchengesetz vorlegen können. Anderenfalls müssen diese Personen diese Belehrung beim Gesundheitsamt durchführen.\n\nDiese Belehrung ist jährlich durch den Arbeitgeber zu wiederholen und zu dokumentieren.",
  "21.2":"Hygieneschulungen müssen jährlich durchgeführt werden.",
  "21.3":"Wareneingangskontrollen und Temperaturkontrollen der Kühlungen sind täglich durchzuführen und zu dokumentieren.",
  "21.4":"Ein Reinigungsplan ist zu erstellen und sichtbar auszuhängen.",
  "22.1":"Toiletten\nDer Arbeitgeber hat Toilettenräume bereitzustellen. Toilettenräume sind für Männer und Frauen getrennt einzurichten oder es ist eine getrennte Nutzung zu ermöglichen. \nToilettenräume sind mit verschließbaren Zugängen, einer ausreichenden Anzahl von Toilettenbecken und Handwaschgelegenheiten zur Verfügung zu stellen. Sie müssen sich sowohl in der Nähe der Arbeitsplätze als auch in der Nähe von Pausen- und Bereitschaftsräumen, Wasch- und Umkleideräumen befinden.\n\nAusstattung von Toiletten:",
  "22.2":"Waschräume\nWaschräume sind zur Verfügung zu stellen, wenn die Arbeitnehmer bei ihrer Tätigkeit u.a. stark geruchsbelästigenden Stoffen, einer mehr als nicht nur geringen Verschmutzung oder der Einwirkung von Hitze ausgesetzt sind. Das trifft für Bäckereien zu.\nWaschräume sind für Frauen und Männer getrennt einzurichten oder es ist eine getrennte Nutzung zu ermöglichen.\n\nAusstattung von Waschräumen:\nFür die Zahl der Waschgelegenheiten ist die höchste Zahl der Arbeitnehmer maßgebend, deren Arbeitszeit in der Regel gleichzeitig endet. Die Zahl der Waschgelegenheiten ist wie folgt zu bemessen:",
  "22.3":"Umkleideräume\nGeeignete Umkleideräume sind zur Verfügung zu stellen, wenn die Beschäftigten bei ihrer Tätigkeit besondere Arbeitskleidung tragen müssen und es ihnen nicht zuzumuten ist, sich in einem anderen Raum umzukleiden. Umkleideräume sind für Männer und Frauen getrennt einzurichten oder es ist eine getrennte Nutzung zu ermöglichen. \n Umkleideräume müssen\nKleiderschränke für Arbeitskleidung und Schutzkleidung sind von Kleiderschränken für persönliche Kleidung und Gegenstände zu trennen, wenn Umstände dies erfordern.\n\nWasch- und Umkleideräume, die voneinander räumlich getrennt sind, müssen untereinander leicht erreichbar sein.",
  "23":"An Bildschirmarbeitsplätzen muss der Bildschirm immer frontal und zentral vor dem Mitarbeiter aufgestellt sein. Schon ein ständiges leichtes Verdrehen des Kopfes führt zu einseitigen Belastungen in der Schulter- und Nackenmuskulatur in deren Folge häufig Wirbelsäulenbeschwerden zu beobachten sind.\n\nDie Arbeitshöhe sollte sowohl an Sitz- als auch an Steharbeitsplätzen bei locker herabhängenden Oberarmen etwa in Ellenbogenhöhe liegen.\n\nHierbei sollten Ober- und Unterarme einen Winkel von 90° oder größer bilden. \n\nAußerdem soll bei annähernd waagerecht verlaufenden Oberschenkeln und ganzflächig aufgestellten Füßen der Winkel zwischen Ober- und Unterschenkel 90° und größer sein. Dabei sollte die gesamte Tiefe der Sitzfläche zum Sitzen ausgenutzt werden und der untere sowie mittlere Teil der Wirbelsäule durch den Lendenbausch und den darüber liegenden Teil der Rückenlehne wirksam abgestützt sein.\n\nDurch Armstützen wird eine erhöhte Belastung des Schulter-/ Armbereiches vermieden.\n\nDie Arbeitsfläche muss eine ausreichend große und reflexionsarme Oberfläche besitzen und eine flexible Anordnung des Bildschirmgerätes, der Tastatur, des Schriftguts und der sonstigen Arbeitsmittel ermöglichen. Ausreichend groß ist eine Arbeitsfläche, wenn ihre Maße mindestens 1600 mm x 800 mm (Breite x Tiefe) betragen.\n\nDer PC sollte möglichst zentral im Blickfeld angeordnet werden sollen. Um eine entspannte Kopfhaltung zu erzielen und visuelle Belastungen zu vermindern, sollte die Blicklinie um etwa 35° aus der Waagerechten abgesenkt sein. Die oberste Zeile auf dem Bildschirm soll keinesfalls oberhalb der horizontalen Sehachse liegen.\n\nEine einseitige Belastung im Schulter-Nacken-Bereich kann zusätzlich vermindert werden, durch eine annähernd gleich häufige Belastung der rechten sowie die linken Schultermuskulatur. Dies kann zum Beispiel erreicht werden, wenn das Telefon bei Rechtshändern links steht und auch mit der linken Hand bedient wird, sowie bei Linkshändern auf der entgegengesetzten Seite.\n\nBüroarbeit verlangt geistige Konzentration. Diese darf nicht unter akustischen Störungen leiden. Auch für routinisierte Bürotätigkeit am Bildschirm sollte der maximale Tages-Durchschnittspegel unter 55 dB (A) bzw. 70 dB (A) liegen. Eine ruhige Arbeitsplatzumgebung fördert die Leistung und mindert Stress. Erfordert der Job sehr hohe Aufmerksamkeit und komplexe geistige Leistungen, sind deutlich niedrigere Schallpegel zu empfehlen. \n\nGegebenenfalls sollte darüber nachgedacht werden, für länger anhaltende Bürotätigkeiten ein Büro außerhalb des Küchenbereiches zur Verfügung zu stellen, um eine konzentriertere Tätigkeit zu ermöglichen.",
  "24":"Aushangpflichtige Gesetze (Unfallverhütungsvorschriften, Jugendarbeitsschutzgesetz, Mutterschutzgesetz u.a.) sind den Mitarbeitern zur Verfügung zu stellen. Anliegend erhalten Sie einen Aushang zu den Gesetzen, die in der Gastronomie öffentlich zugänglich gemacht werden müssen.",
  "25":"Betriebsanweisungen für Maschinen\n\nDie Betriebsanweisungen für die Maschinen sind an geeigneter Stelle auszuhängen. Betriebsanweisungen sind rechtsverbindliche Anweisungen vom Unternehmer an das Personal.  Bitte kontrollieren Sie die Inhalte und machen Sie diese den Mitarbeitern bekannt (aushängen). Bitte informieren Sie uns auch, falls noch Betriebsanweisungen fehlen.",
  "26":"Beträgt die Höhe der Einfüllöffnung mehr als 1400 mm oder werden die zumutbaren Werte für das Heben und Tragen von Lasten überschritten, müssen für Arbeitsmittel Beschickungseinrichtungen vorhanden sein. \n\nAbweichend hiervon müssen Beschickungseinrichtungen erst für Einfüllöffnungshöhen von mehr als 1650 mm vorhanden sein, wenn diese Höhe aus sicherheitstechnischen Gründen erforderlich ist.\n\nSchon eine länger andauernde Beugung des Rückens von nur 20 Grad aus der Senkrechten nach vorn belastet die Bandscheiben ungünstig und führt langfristig zu Schäden. Optimal angepasste Arbeitshöhen verhindern Rückenbeschwerden. Die durchschnittliche Körpergröße der in einem Bereich hauptsächlich tätigen Personen ist der Maßstab für eine ergonomisch optimale, körpergerechte Gestaltung der Arbeitshöhen. An ihr sind Arbeitshöhen auszurichten.\n\nDa die individuellen körperlichen Voraussetzungen der Mitarbeiter in Küchen sehr unterschiedlich sind, muss man Möglichkeiten schaffen, um gegebenenfalls Höhenunterschiede auszugleichen, um Rückenbeschwerden durch körperliche Fehlhaltungen zu vermeiden. Eine preiswerte praktikable Lösung sind höhenanpassbare Schneidbretter.",
  "27":"Erhöhte Arbeitsplätze und Podeste\n\nStändige Arbeitsplätze an Arbeitsmitteln von 0,20 m bis 1,00 m Höhe über Flur müssen mit einem mindestens einstäbigen Geländer (Handleiste) von 1,00 m Höhe ausgerüstet sein.",
  "28":"Der Zugriff zu den Gefahrstellen im Bottich muss verhindert sein, z.B. durch eine fest angebrachte oder bewegliche, verriegelte Schutzeinrichtung.\n\nAn Teigknetmaschinen müssen die Gefährdungen durch den Nachlauf der Knetwerkzeuge verhindert sein, z.B. durch eine Bremse, die beim Öffnen der Schutzeinrichtung den Nachlauf bei leerem Bottich auf höchstens 4 s begrenzt oder Verriegelung mit Zuhaltung.",
  "29":"Bei der Teigaufbereitung darf Backmehl nur dann im Handwurf verwendet werden, wenn eine geeignete Absaugeinrichtung (z.B. Mehlstaubabsauganlage) vorhanden ist. Der Handwurf ist auch dann möglich, wenn staubarmes Spezialmehl (z.B. HT-Mehl, Weizendunst) verwendet wird. Alternativen zur Handwurftechnik, bei denen Backmehl als Trennmittel verwendet werden darf, sind z.B. das Auflegen und Verreiben des Backmehles auf Oberflächen und das Auftragen mit einer für Lebensmittel geeigneten Rolle oder einem handgeführten Sieb auf die zu bestaubenden Flächen. Stärke als Trennmittel ist primär nicht sensibilisierend, kann jedoch aufgrund starker Staubentwicklung zu irritativer Reizung der Atemwege führen. Aus diesem Grund rät die BGN vom Gebrauch von Stärkeprodukten als Trennmittel ab.\n\nBei der manuellen Teigaufbereitung werden als Trennmittel empfohlen:\nstaubarme Spezialmehle: z.B. staubreduzierte Mehle, Weizendunst und Hartweizengrieß, HT-Mehle (HydroThermisch behandelte Mehle).\n\nZur Früherkennung von allergischen Atemwegserkrankungen müssen den Mitarbeitern arbeitsmedizinische Vorsorgeuntersuchungen angeboten werden. Der Mitarbeiter entscheidet selbst darüber, ob er diese in Anspruch nehmen möchte.\nDiese Untersuchung wird auf Grundlage des Grundsatzes G 23 durchgeführt und beinhaltet eine Lungenfunktionsdiagnostik, eine ausführliche Anamneseerhebung sowie eine ärztliche Beratung zu vorbeugenden oder therapeutischen Maßnahmen.\n\nZur weiteren umfassenden Diagnostik der allergischen Beschwerden wird empfohlen, dass Herr/ Frau … in das Bäckerpräventionsprogramm der BGN aufgenommen wird. Dazu ist eine Berufskrankheiten-Verdachtsmeldung bei der Berufsgenossenschaft erforderlich.\n\nAuf Grund des Beschwerdebildes bei Frau/Herrn… muss eine Berufskrankheiten-Verdachtsmeldung bei der Berufsgenossenschaft erfolgen. Diese können Sie als Unternehmer selbst vollziehen. Nutzen Sie bitte beiliegendes Formular.\n\nBeim offenen, staubreichen Umgang mit Mehl (z.B. Mehleingabe aus Säcken oder Silo, Brotaufarbeitung mit Hand, Reinigungsarbeiten) wird das Tragen einer Halbmaske der Schutzstufe FFP 1 oder 2 empfohlen.",
  "30":"Keimbelastung in Brotkörben und auf Bändern\n\nMit Schimmel belastete Brotkörbe sind auszutauschen.\n\nSchimmelbildung kann nur verhindert werden, wenn die Brotkörbe nach dem Teigling schnell wieder trocknen können. Das Stapeln der Körbe im feuchten Zustand sollte deshalb vermieden werden.",
  "31":"Beschäftigung von schwangeren Mitarbeiterinnen\n\nBei der Beschäftigung von schwangeren Mitarbeiterinnen sind folgende Punkte bei Mitteilung der Schwangerschaft durchzuführen:\nIn einer Gefährdungsbeurteilung nach Mutterschutzgesetzt wird geprüft ob die ausgeführten Tätigkeiten mit den Beschränkungen des Mutterschutzgesetztes vereinbar sind. Diese Gefährdungsbeurteilung ist zu dokumentieren und aufzubewahren.\nDas Ergebnis dieser Gefährdungsbeurteilung ist anhand eines amtlichen Formulars der zuständigen Behörde mitzuteilen.\nRegelungen des novellierten Mutterschutzgesetzes fordern, dass jeder Arbeitsplatz im Betrieb respektiv durchzuführen ist. \n\nBei Bedarf beantworten wir Ihre Fragen unter oben genannter Telefonnummer und senden Ihnen entsprechende Informationsunterlagen zu.",
  "32":"Kompetenzzentrenmodell - Fernlehrgang\n\nKleinbetriebe (max. 10 Beschäftigte) können sich für das BGN-Kompetenzzentren-Modell entscheiden. Das Besondere an diesem Modell ist, dass der Unternehmer eines Kleinbetriebes keinen betriebsärztlichen und sicherheitstechnischen Spezialisten für eine regelmäßige Betreuung einkaufen muss. Er kann sich selbst betreuen, wenn er sich – und das ist die Voraussetzung – für diese Aufgabe über einen Fernlehrgang qualifiziert hat.\n\nSie können online Ihren Fernlehrgang anfordern unter:\nhttps://www.bgn.de/praevention-arbeitshilfen/unsere-leistungen/arbeitsmedizinische-und-sicherheitstechnische-betreuung/qualifizierung-nach-dguv-vorschrift-2/fernlehrgang-anfordern",
  "33":"Türen, die zu mehr als drei Vierteln ihrer Fläche aus Glas bestehen, müssen in Augenhöhe so gekennzeichnet sein, dass sie deutlich wahrgenommen werden können. Eine einfache und in vielen Fällen wirksame Maßnahme zur Kenntlichmachung ist das Bekleben der Glasflächen mit dem Firmenlogo. Diese Markierung sollte in einer Höhe angebracht werden, die von den Türbenutzenden gut zu erkennen ist (Augenhöhe).",
  "34":"Laut der Betriebssicherheitsverordnung (BetrSichV) ist der Arbeitgeber dazu verpflichtet, sämtliche Lagereinrichtungen systematisch und regelmäßig zu prüfen. Die Durchführung der Regalprüfung nach DIN EN 15635 sollte dabei von einer fachkundigen Person im 12-Monats-Intervall erfolgen.",
  "35":"Seit September 2021 gibt es eine neue DGUV-Vorschrift zur Überfallprävention auch in Verkaufsstellen mit einer Konkretisierung für Verkaufsgeschäfte. Im Folgenden werden die wesentlichen Punkte kurz dargestellt.\n\nGrundsätzliche Themen sind:\nGestaltung der Betriebsstätte\nAlarmierung\nUmgang mit Bargeld\nÜberfallnachsorge\n\nWesentlich ist dabei, dass der Unternehmer das Überfallrisiko zu beurteilen hat und entsprechende und darauf abgestimmte Sicherheitsmaßnahmen festlegen und umsetzen muss.\n\nIn Abhängigkeit von der Gefährdungslage ergibt sich ggf. Handlungsbedarf für entsprechende Alarmierungsmöglichkeiten.\n\nGrundsätzlich hat der Unternehmer den Versicherten, die Umgang mit Banknoten haben, für ihre Tätigkeit geeignete Alarmierungsmöglichkeiten, mindestens ein Telefon, zur Verfügung zu stellen, über die sie eine hilfebringende Stelle unmittelbar erreichen können. \n\nDie Installation von zusätzlichen Alarmierungsmöglichkeiten in Abhängigkeit von der Gefährdungslage in geeigneten Nebenräumen, z.B. Lager oder Pausenraum, wird empfohlen. Eine geeignete Alarmierungsmöglichkeit ist z.B. ein Alarmauslöser einer Überfallmeldeanlage. \nFalls eine Überfallmeldeanlage vorhanden ist, muss der Alarm direkt zu einer hilfebringenden Stelle übertragen werden. Hilfebringende Stellen sind beispielsweise ständig besetzte Notruf- und Serviceleitstellen oder die Leitstellen der Polizei. Dabei hat die Alarmierung grundsätzlich still zu erfolgen (durch z. B. einen versteckten Alarmtaster). Durch die Alarmauslösung sollen Versicherte oder Dritte nicht in Gefahr gebracht werden. Die Alarmauslösung darf zu keiner weiteren Eskalation führen. \n\nBei Alarmierung per Telefon ist die zur Alarmierung notwendige Nummer \n• bei Nutzung von Mobiltelefonen mittels programmierter Notrufnummer (Zieltaste),\n• bei Nutzung von Festnetztelefonen am Gerät oder in der Nähe des Gerätes bekannt    \n   zu machen. \n\nBei Geldtransporten ist den Versicherten ebenfalls eine Alarmierungsmöglichkeit zur Verfügung zu stellen, z.B.: \n• Mobiltelefone mit programmierter Notrufnummer (Zieltaste)",
  "36":"Die Notwendigkeit von arbeitsmedizinischen Vorsorgen richtet sich nach den tatsächlichen Gefährdungen im Betrieb, d.h. diese müssten sich aus der Gefährdungsbeurteilung ergeben. Dabei wird unterschieden nach Angebots- und Pflichtvorsorgen. \n\nIst die Gefährdung sehr hoch, ist mit einem hohem Erkrankungsrisiko zu rechnen. In diesem Fall muss der Betriebsarzt Vorsorgen durchführen und es sind demzufolge Pflichtvorsorgen.\n\nBei einer moderaten Gefährdung muss der Arbeitgeber lediglich Vorsorgen anbieten. Das Angebot hat jährlich schriftlich zu erfolgen und ist zu dokumentieren. Man spricht in diesem Fall von Angebotsvorsorgen.\n\nDie Auslösekriterien für Pflicht- oder Angebotsvorsorgen sind in einzelnen Vorschriften bzw. Rechtsnormen geregelt. Arbeitsmedizinische Vorsorgen sind in der Regel alle 3 Jahre zu wiederholen, bei Bedarf auch früher (wird vom Arzt festgelegt).\n\nFolgende Vorsorgen sind für den Betrieb aus bisheriger Sicht relevant:"
};const PRESET_GERAETE = [
  'Fritteuse', 'Konvektomat', 'Aufschnittmaschine', 'Flüssiggas (Küche)',
  'Flüssiggas (Heizstrahler)', 'Getränkeschankanlage', 'Knetmaschine',
  'Teigausrollmaschine', 'Wolf', 'Dönergrill', 'Salamander'
];
const PRESET_GS = [
  'Geschirrmaschinenreiniger', 'Grillreiniger', 'Gläserspülmaschinenreiniger',
  'Chlorix', 'Fettlöser ätzend', 'Fettlöser reizend', 'Entkalker',
  'Schnelldesinfektion'
];
const PRESET_FLEISCHEREI = [
  'Automatenwolf', 'Entschwartungs- & Entvliesmaschine',
  'Handgeführte Band- & Kreissäge', 'Handmesser', 'Kutter',
  'Speck- und Würfelschneider', 'Stat. Bandsäge',
  'Stechschutzschürze', 'Wurstfüllmaschine Kolben', 'Stopfwolf',
  'chloralk. Reiniger', 'saurer Reiniger', 'Rauchteerlöser'
];

// ── STATE ─────────────────────────────────────────────────────
let sel    = new Set();
let notes  = {};
let hist   = [];
let nz     = { ansprechpartner:'', email:'', telefon:'', website:'', mitarbeiter:'', betriebsmittel:[], maschinen:[], gefahrstoffe:[], freitext:'' };
let cfg    = { name:'Oliver Schladt', titel:'Fachkraft für Arbeitssicherheit', mobil:'0151 64623340', mail:'oliver@schladt-arbeitsschutz.de', firma:'Schladt Arbeitsschutz GmbH', adresse:'Kirchstraße 27, 77736 Zell a. H.' };

// ── PERSIST ───────────────────────────────────────────────────
function save() {
  try {
    localStorage.setItem('bg3', JSON.stringify({
      sel:[...sel], notes, hist, nz, cfg,
      betrieb: G('inp-betrieb').value,
      betriebsart: G('inp-betriebsart').value,
      datum: G('inp-datum').value
    }));
  } catch(e) {}
}
function load() {
  try {
    const d = JSON.parse(localStorage.getItem('bg3') || '{}');
    if (d.sel)        sel   = new Set(d.sel);
    if (d.notes)      notes = d.notes;
    if (d.hist)       hist  = d.hist;
    if (d.nz)         nz    = {...nz, ...d.nz};
    if (d.cfg)        cfg   = {...cfg, ...d.cfg};
    if (d.betrieb)    G('inp-betrieb').value    = d.betrieb;
    if (d.betriebsart)G('inp-betriebsart').value= d.betriebsart;
    if (d.datum)      G('inp-datum').value       = d.datum;
  } catch(e) {}
}

// ── HELPERS ───────────────────────────────────────────────────
const G = id => document.getElementById(id);
function toast(msg) {
  const t = G('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}
function fmtDate(s) {
  if (!s) return '___________';
  const [y,m,d] = s.split('-'); return d+'.'+m+'.'+y;
}

// ── TABS ──────────────────────────────────────────────────────
function switchTab(tab) {
  ['alle','selected','notizen','history','settings'].forEach(t => {
    G('tab-'+t).classList.toggle('active', t===tab);
    G('view-'+t).style.display = t===tab ? '' : 'none';
  });
  if (tab==='selected') renderSelected();
  if (tab==='notizen')  renderNotizen();
  if (tab==='history')  renderHistory();
  if (tab==='settings') loadSettings();
}

// ── COUNT ─────────────────────────────────────────────────────
function updateCount() {
  const n = sel.size;
  G('cnt').textContent = n;
  G('hdr-count').textContent = n + ' ausgewählt';
  G('tab-selected').innerHTML = 'Ausgewählt' + (n ? '<span class="tab-badge">'+n+'</span>' : '');
}

// ── RENDER ALL ────────────────────────────────────────────────
function renderAll() {
  const c = G('view-alle'); c.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const allOn = cat.items.every(i => sel.has(i.num));
    const catDiv = document.createElement('div');
    catDiv.className = 'cat';
    const hdr = document.createElement('div');
    hdr.className = 'cat-hdr';
    hdr.onclick = () => catDiv.classList.toggle('collapsed');
    hdr.innerHTML = '<span class="cat-num">'+cat.num+'</span><span class="cat-title">'+cat.title+'</span><span class="cat-toggle">▾</span>';
    const allBtn = document.createElement('button');
    allBtn.className = 'cat-all';
    allBtn.textContent = allOn ? '✓ Alle' : 'Alle';
    allBtn.onclick = (e) => { e.stopPropagation(); toggleAllCat(cat.num); };
    hdr.insertBefore(allBtn, hdr.querySelector('.cat-toggle'));
    catDiv.appendChild(hdr);
    const itemsDiv = document.createElement('div');
    itemsDiv.className = 'items';
    cat.items.forEach(item => {
      const wrap = document.createElement('div');
      wrap.className = 'item-wrap';
      wrap.id = 'iw_' + item.num.replace(/[^a-z0-9]/gi,'_');
      const itemEl = document.createElement('div');
      itemEl.className = 'item' + (sel.has(item.num) ? ' sel' : '');
      itemEl.innerHTML = '<div class="chk"></div><span class="item-num">'+item.num+'</span><span class="item-lbl">'+item.label+'</span>';
      itemEl.onclick = () => toggleItem(item.num);
      const noteWrap = document.createElement('div');
      noteWrap.className = 'note-wrap';
      noteWrap.style.display = sel.has(item.num) ? '' : 'none';
      const ta = document.createElement('textarea');
      ta.className = 'note-ta'; ta.placeholder = 'Anmerkung…';
      ta.value = notes[item.num] || '';
      ta.oninput = () => saveNote(item.num, ta.value);
      noteWrap.appendChild(ta);
      wrap.appendChild(itemEl); wrap.appendChild(noteWrap);
      itemsDiv.appendChild(wrap);
    });
    catDiv.appendChild(itemsDiv);
    c.appendChild(catDiv);
  });
  updateCount();
}

function toggleCat(el) { el.classList.toggle('collapsed'); }

function toggleAllCat(catNum) {
  const cat = CATEGORIES.find(c => c.num===catNum);
  const allOn = cat.items.every(i => sel.has(i.num));
  cat.items.forEach(i => allOn ? sel.delete(i.num) : sel.add(i.num));
  renderAll(); save();
}

function toggleItem(num) {
  if (sel.has(num)) sel.delete(num); else sel.add(num);
  const id = 'iw_'+num.replace(/[^a-z0-9]/gi,'_');
  const wrap = G(id);
  if (wrap) {
    const on = sel.has(num);
    wrap.querySelector('.item').classList.toggle('sel', on);
    wrap.querySelector('.note-wrap').style.display = on ? '' : 'none';
    if (on) setTimeout(() => wrap.querySelector('textarea').focus(), 80);
  }
  updateCount(); save();
}

function saveNote(num, val) {
  if (val.trim()) notes[num] = val; else delete notes[num];
  save();
}

// ── SELECTED ──────────────────────────────────────────────────
function renderSelected() {
  const c = G('sel-list');
  if (!sel.size) { c.innerHTML = '<div class="empty"><div class="icon">📋</div><p>Nichts ausgewählt.</p></div>'; return; }
  c.innerHTML = '';
  CATEGORIES.forEach(cat => cat.items.forEach(item => {
    if (!sel.has(item.num)) return;
    const row = document.createElement('div');
    row.className = 'sel-row';
    const note = notes[item.num];
    row.innerHTML = '<span class="snum">'+item.num+'</span><div style="flex:1"><div class="slbl">'+item.label+'</div>'+(note?'<div class="snote">📝 '+note.substring(0,80)+(note.length>80?'…':'')+'</div>':'')+'</div>';
    const xBtn = document.createElement('button');
    xBtn.className = 'xbtn'; xBtn.textContent = '×';
    xBtn.onclick = () => removeItem(item.num);
    row.appendChild(xBtn);
    c.appendChild(row);
  }));
}

function removeItem(num) { sel.delete(num); delete notes[num]; renderSelected(); updateCount(); save(); }

// ── LEEREN ────────────────────────────────────────────────────
function doLeeren() {
  if (!sel.size) { toast('Nichts ausgewählt.'); return; }
  if (!confirm('Alle ausgewählten Ziffern und Notizen zurücksetzen?')) return;
  sel.clear(); notes = {};
  renderAll(); updateCount(); save();
  toast('Auswahl geleert');
}

// ── NOTIZEN ───────────────────────────────────────────────────
function renderNotizen() {
  ['ansprechpartner','email','telefon','website','mitarbeiter','freitext'].forEach(k => {
    const el = G('nz-'+k); if (el) nz[k] = el.value;
  });
  const c = G('nz-container'); c.innerHTML = '';

  function addSection(title, content) {
    const sec = document.createElement('div');
    sec.className = 'nz-sec';
    const h = document.createElement('h3'); h.textContent = title;
    sec.appendChild(h);
    content(sec);
    c.appendChild(sec);
  }

  function makeField(labelTxt, type, key, ph) {
    const wrap = document.createElement('div'); wrap.className = 'nz-field';
    const lbl = document.createElement('label'); lbl.textContent = labelTxt;
    const inp = document.createElement(type === 'textarea' ? 'textarea' : 'input');
    if (type !== 'textarea') inp.type = type;
    inp.className = type === 'textarea' ? 'note-ta' : '';
    if (type === 'textarea') { inp.style.minHeight = '100px'; inp.style.resize = 'none'; }
    inp.id = 'nz-'+key; inp.placeholder = ph; inp.value = nz[key] || '';
    inp.oninput = () => { nz[key] = inp.value; save(); };
    wrap.appendChild(lbl); wrap.appendChild(inp);
    return wrap;
  }

  function makeChips(key, presets, sec) {
    const grp = document.createElement('div'); grp.className = 'chip-grp';
    presets.forEach(v => {
      const btn = document.createElement('button');
      btn.className = 'chip' + ((nz[key]||[]).includes(v) ? ' on' : '');
      btn.textContent = (nz[key]||[]).includes(v) ? '✓ '+v : v;
      btn.onclick = () => toggleChip(key, v);
      grp.appendChild(btn);
    });
    sec.appendChild(grp);
  }

  function makeList(key, ph, sec) {
    (nz[key]||[]).forEach((v, i) => {
      const row = document.createElement('div'); row.className = 'nz-list-item';
      const inp = document.createElement('input'); inp.type = 'text';
      inp.value = v; inp.placeholder = ph;
      inp.oninput = () => { nz[key][i] = inp.value; save(); };
      const del = document.createElement('button'); del.className = 'nz-del'; del.textContent = '×';
      del.onclick = () => { nz[key].splice(i,1); renderNotizen(); save(); };
      row.appendChild(inp); row.appendChild(del); sec.appendChild(row);
    });
    const addBtn = document.createElement('button'); addBtn.className = 'nz-add';
    addBtn.textContent = '+ Eigenen Eintrag hinzufügen';
    addBtn.onclick = () => {
      nz[key] = nz[key] || []; nz[key].push('');
      renderNotizen();
      setTimeout(() => { const els = c.querySelectorAll('.nz-list-item input'); if (els.length) els[els.length-1].focus(); }, 50);
    };
    sec.appendChild(addBtn);
  }

  // Betriebskontakt
  addSection('Betriebskontakt', sec => {
    sec.appendChild(makeField('Ansprechpartner','text','ansprechpartner','Name, Funktion'));
    sec.appendChild(makeField('E-Mail','email','email','email@betrieb.de'));
    sec.appendChild(makeField('Telefon','tel','telefon','+49 ...'));
    sec.appendChild(makeField('Website','text','website','www.betrieb.de'));
    sec.appendChild(makeField('Anzahl Mitarbeiter','text','mitarbeiter','z.B. 12 VZ, 4 TZ'));
  });

  // Geräte
  addSection('Vorhandene Geräte', sec => {
    makeChips('betriebsmittel', PRESET_GERAETE, sec);
    makeList('betriebsmittel', 'Weiteres Gerät…', sec);
  });

  // Gefahrstoffe
  addSection('Vorhandene Gefahrstoffe', sec => {
    makeChips('gefahrstoffe', PRESET_GS, sec);
    makeList('gefahrstoffe', 'Weiterer Gefahrstoff…', sec);
  });

  // Fleischerei
  addSection('Fleischerei (selten)', sec => {
    makeChips('betriebsmittel', PRESET_FLEISCHEREI, sec);
  });

  // Freitext
  addSection('Weitere Notizen', sec => {
    sec.appendChild(makeField('Freitext','textarea','freitext','Beobachtungen, Besonderheiten…'));
  });
}

function toggleChip(key, val) {
  nz[key] = nz[key] || [];
  const i = nz[key].indexOf(val);
  if (i===-1) nz[key].push(val); else nz[key].splice(i,1);
  save(); renderNotizen();
}

// ── HISTORY ───────────────────────────────────────────────────
function saveToHistory() {
  if (!sel.size) { toast('Nichts ausgewählt.'); return; }
  hist.unshift({
    id: Date.now(),
    betrieb: G('inp-betrieb').value || 'Unbekannt',
    betriebsart: G('inp-betriebsart').value,
    datum: G('inp-datum').value,
    sel: [...sel], notes: {...notes}, nz: JSON.parse(JSON.stringify(nz)),
    savedAt: new Date().toLocaleString('de-DE')
  });
  if (hist.length > 50) hist = hist.slice(0,50);
  save(); toast('✓ Gespeichert');
}

function renderHistory() {
  const c = G('hist-list');
  if (!hist.length) { c.innerHTML = '<div class="empty"><div class="icon">🗂</div><p>Keine gespeicherten Begehungen.</p></div>'; return; }
  c.innerHTML = hist.map(e => {
    const d = e.datum ? e.datum.split('-').reverse().join('.') : '–';
    return '<div class="hist">' +
      '<div class="hist-hdr"><span class="hist-name">'+e.betrieb+'</span><span class="hist-date">'+d+'</span></div>' +
      '<div class="hist-meta">'+(e.betriebsart||'–')+' · '+(e.sel||[]).length+' Punkte · '+e.savedAt+'</div>' +
      '<div class="hist-acts">' +
        '<button class="hbtn" onclick="loadEntry('+e.id+')">📂 Laden</button>' +
        '<button class="hbtn" onclick="pdfEntry('+e.id+')">📄 PDF</button>' +
        '<button class="hbtn danger" onclick="delEntry('+e.id+')">🗑 Löschen</button>' +
      '</div></div>';
  }).join('');
}

function loadEntry(id) {
  const e = hist.find(x=>x.id===id); if (!e) return;
  sel = new Set(e.sel); notes = {...e.notes};
  if (e.nz) nz = {...nz, ...e.nz};
  G('inp-betrieb').value    = e.betrieb;
  G('inp-betriebsart').value= e.betriebsart||'';
  G('inp-datum').value      = e.datum;
  save(); switchTab('alle'); renderAll(); toast('Begehung geladen');
}

function delEntry(id) {
  hist = hist.filter(x=>x.id!==id); save(); renderHistory(); toast('Gelöscht');
}

function pdfEntry(id) {
  const e = hist.find(x=>x.id===id); if (!e) return;
  buildPDF(e.betrieb, e.betriebsart, e.datum, new Set(e.sel), e.notes, e.nz||nz);
}

// ── SETTINGS ──────────────────────────────────────────────────
function loadSettings() {
  G('set-name').value    = cfg.name||'';
  G('set-titel').value   = cfg.titel||'';
  G('set-mobil').value   = cfg.mobil||'';
  G('set-mail').value    = cfg.mail||'';
  G('set-firma').value   = cfg.firma||'';
  G('set-adresse').value = cfg.adresse||'';
}
function saveSettings() {
  cfg = { name:G('set-name').value, titel:G('set-titel').value, mobil:G('set-mobil').value, mail:G('set-mail').value, firma:G('set-firma').value, adresse:G('set-adresse').value };
  save(); toast('✓ Gespeichert');
}

// ── PDF ───────────────────────────────────────────────────────
function doPDF() {
  if (!sel.size) { toast('Bitte zuerst Ziffern auswählen.'); return; }
  buildPDF(
    G('inp-betrieb').value || '___________',
    G('inp-betriebsart').value,
    G('inp-datum').value,
    sel, notes, nz
  );
}

function buildPDF(betrieb, betriebsart, datum, selSet, noteMap, nzData) {
  const today  = fmtDate(new Date().toISOString().split('T')[0]);
  const begDat = fmtDate(datum);

  let rows = '';
  CATEGORIES.forEach(cat => {
    const catSel = cat.items.filter(i => selSet.has(i.num));
    if (!catSel.length) return;
    rows += '<tr><td colspan="2" style="padding:0;height:10px;border:none;background:transparent"></td></tr><tr><td colspan="2" class="sec-hd">'+cat.num+'&nbsp;&nbsp;'+cat.title+'</td></tr>';
    catSel.forEach(item => {
      const txt = (ITEM_FULLTEXT[item.num]||item.label).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
      const note = noteMap[item.num];
      rows += '<tr style="page-break-inside:avoid;break-inside:avoid"><td class="nc" style="page-break-inside:avoid;break-inside:avoid">'+item.num+'</td><td class="tc" style="page-break-inside:avoid;break-inside:avoid">'+txt+(note?'<div class="nt"><b>Anmerkung:</b> '+note+'</div>':'')+'</td></tr>';
    });
  });

  let nzRows = '';
  if (nzData) {
    const nzd = nzData;
    const hasC = nzd.ansprechpartner||nzd.email||nzd.telefon||nzd.website||nzd.mitarbeiter;
    const hasBm = (nzd.betriebsmittel||[]).filter(Boolean).length||(nzd.maschinen||[]).filter(Boolean).length;
    const hasGS = (nzd.gefahrstoffe||[]).filter(Boolean).length;
    const hasTxt = nzd.freitext;
    if (hasC||hasBm||hasGS||hasTxt) {
      if (hasC) {
        nzRows += '<tr><td colspan="2" class="sec-hd">Betriebskontakt</td></tr>';
        if (nzd.ansprechpartner) nzRows += '<tr><td class="nc-lbl">Ansprechpartner</td><td class="tc">'+nzd.ansprechpartner+'</td></tr>';
        if (nzd.email)           nzRows += '<tr><td class="nc-lbl">E-Mail</td><td class="tc">'+nzd.email+'</td></tr>';
        if (nzd.telefon)         nzRows += '<tr><td class="nc-lbl">Telefon</td><td class="tc">'+nzd.telefon+'</td></tr>';
        if (nzd.website)         nzRows += '<tr><td class="nc-lbl">Website</td><td class="tc">'+nzd.website+'</td></tr>';
        if (nzd.mitarbeiter)     nzRows += '<tr><td class="nc-lbl">Mitarbeiter</td><td class="tc">'+nzd.mitarbeiter+'</td></tr>';
      }
      if (hasBm) {
        nzRows += '<tr><td colspan="2" class="sec-hd">Betriebsmittel / Maschinen</td></tr>';
        [...(nzd.betriebsmittel||[]),...(nzd.maschinen||[])].filter(Boolean).forEach(v => { nzRows += '<tr><td class="nc"></td><td class="tc">'+v+'</td></tr>'; });
      }
      if (hasGS) {
        nzRows += '<tr><td colspan="2" class="sec-hd">Gefahrstoffe / Reinigungsmittel</td></tr>';
        (nzd.gefahrstoffe||[]).filter(Boolean).forEach(v => { nzRows += '<tr><td class="nc"></td><td class="tc">'+v+'</td></tr>'; });
      }
      if (hasTxt) {
        nzRows += '<tr><td colspan="2" class="sec-hd">Weitere Notizen</td></tr>';
        nzRows += '<tr><td colspan="2" class="tc" style="padding:8px 12px">'+nzData.freitext.replace(/\n/g,'<br>')+'</td></tr>';
      }
    }
  }

  const doc = `<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8">
<title>Begehungsprotokoll ${betrieb}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:10pt;color:#111;padding:15mm}
.logo-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid #1a4a8a}
.logo-row img.lt,.logo-row img.ls{background:white;padding:3px 6px;border-radius:3px;height:40px;object-fit:contain}
.logo-row img.la{height:38px;object-fit:contain}
.hb{font-size:9pt;color:#444;line-height:1.7;margin-bottom:12px}
hr{border:none;border-top:1.5px solid #1a4a8a;margin:10px 0}
.to{font-size:9pt;color:#555;margin-bottom:3px}
.dt{font-size:9pt;color:#555;margin-bottom:14px}
h1{font-size:13pt;font-weight:bold;margin-bottom:8px}
.intro{font-size:10pt;margin-bottom:14px;line-height:1.5}
table{width:100%;border-collapse:collapse;page-break-inside:auto}tbody{display:table-row-group}
td{border:1px solid #ccc;vertical-align:top}
.sec-hd{background:#eef3fa;color:#1a4a8a;font-weight:bold;font-size:12pt;padding:10px 12px;letter-spacing:0.03em;page-break-after:avoid}
.nc{width:50px;background:#eef3fa;font-family:monospace;font-size:8.5pt;font-weight:bold;color:#1a4a8a;padding:6px 4px;text-align:center}
.nc-lbl{width:120px;background:#eef3fa;font-size:9pt;font-weight:bold;padding:6px 8px}
.tc{padding:6px 10px;font-size:9.5pt;line-height:1.5}
.nt{margin-top:5px;font-size:9pt;color:#333;font-style:italic}
.nz-tbl{margin-top:16px}
.footer{margin-top:18px;font-size:9pt;color:#444;border-top:1px solid #ccc;padding-top:12px}
@media print{@page{margin:12mm;size:A4}body{padding:0}tr{page-break-inside:avoid;break-inside:avoid}table{border-collapse:collapse}td{page-break-inside:avoid;break-inside:avoid}}
</style></head><body>
<div class="logo-row">
  <img class="lt" src="${LOGO_T}" alt="Thumedi">
  <img class="ls" src="${LOGO_S}" alt="Schladt">
  <img class="la" src="${LOGO_A}" alt="ASD*BGN">
</div>
<div class="hb">
  <b>Zentrum: Stuttgart</b> · im Auftrag der <b>THUMEDI Präventionsmanagement GmbH</b><br>
  Straße der Freundschaft 68 · 09419 Thum-Jahnsbach<br>
  <b>${cfg.name}</b> · ${cfg.titel}<br>
  Mobil: ${cfg.mobil} · Mail: ${cfg.mail}<br>
  ${cfg.firma} · ${cfg.adresse}
</div>
<hr>
<div class="to">An: ${betrieb}${betriebsart?' ('+betriebsart+')':''}</div>
<div class="dt">Stuttgart, ${today}</div>
<h1>Protokoll zur Betriebsbegehung am ${begDat}</h1>
<div class="intro">Sehr geehrte Damen und Herren,<br>die oben genannte Betriebsbegehung/Betriebsberatung fassen wir wie folgt zusammen:</div>
<table>${rows}</table>
${nzRows ? '<table class="nz-tbl">'+nzRows+'</table>' : ''}
<div class="footer">
  Falls Sie noch Fragen haben, wenden Sie sich bitte direkt an mich.<br><br>
  Mit freundlichen Grüßen<br><br>
  <b>${cfg.name}</b><br>${cfg.titel}<br><br>
  <i>Im Auftrag der Thumedi-Präventions-Management GmbH und des ASD*BGN</i>
</div>
</body></html>`;

  const w = window.open('', '_blank');
  if (w) {
    w.document.write(doc);
    w.document.close();
    w.focus();
    setTimeout(() => w.print(), 600);
  } else {
    // Fallback: download as HTML
    const a = document.createElement('a');
    a.href = 'data:text/html;charset=utf-8,' + encodeURIComponent(doc);
    a.download = 'Begehungsprotokoll.html';
    a.click();
    toast('Als HTML gespeichert – im Browser öffnen und drucken');
  }
}

// ── INIT ──────────────────────────────────────────────────────
G('inp-datum').value = new Date().toISOString().split('T')[0];
G('hdr-logo-t').src = LOGO_T;
G('hdr-logo-s').src = LOGO_S;
G('hdr-logo-a').src = LOGO_A;
// Settings logos
const slt = document.getElementById('set-logo-t'); if(slt) slt.src = LOGO_T;
const sls = document.getElementById('set-logo-s'); if(sls) sls.src = LOGO_S;
const sla = document.getElementById('set-logo-a'); if(sla) sla.src = LOGO_A;
['inp-betrieb','inp-betriebsart','inp-datum'].forEach(id => G(id).addEventListener('input', save));
load();
renderAll();
</script>
</body></html>
